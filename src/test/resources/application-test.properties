# Disable Eureka
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable DB auto-config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Dummy JWT values
jwt.secret=test
jwt.refresh-token-expiration=3600
jwt.access-token-expiration=3600
jwt.issuer=test

# Disable server port
server.port=0

# Override required env placeholders
SERVER_PORT=0
DB_URL=none
DB_USERNAME=none
DB_PASSWORD=none
JWT_SECRET=test
JWT_REFRESH_EXP=3600
JWT_ACCESS_EXP=3600
JWT_ISSUER=test
blacklist.cleanup.enabled=false

