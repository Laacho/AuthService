name: CI - Build & Test
run-name: "CI Pipeline – ${{ github.event.pull_request.title || github.ref_name }}"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  Ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
            java-version: '21'
            distribution: 'temurin'

      - name: Install Maven 3.9.9
        run: |
         wget -q https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.tar.gz
         tar -xzf apache-maven-3.9.9-bin.tar.gz
         echo "$PWD/apache-maven-3.9.9/bin" >> $GITHUB_PATH

      - name: Debug Java and Maven
        run: |
          echo "=== PATH ==="
          echo "$PATH"
          echo "=== which/java & version ==="
          which java || true
          java -version || true
          echo "=== which/mvn & version ==="
          which mvn || true
          mvn -version || true

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
            dockerfile: Dockerfile

      - name: Build and test
        run: mvn -B -e -X clean verify
